<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>PromptVault — Fuzzy-search AI prompts, copy in one tap</title>
  <meta name="description" content="A vibrant library of ready-to-use AI prompts. Fuzzy search, expand, and copy instantly." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=edgeghosts1" />
  <script>
    /* Set theme before paint to avoid a flash of the wrong theme. */
    (function () {
      try {
        var t = localStorage.getItem("promptvault-theme") || "light";
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div class="aurora" aria-hidden="true"></div>
  <div class="bg-orbs" aria-hidden="true">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
    <span class="orb orb-4"></span>
  </div>

  <div id="edge-ghosts" class="edge-ghosts" aria-hidden="true"></div>

  <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle light and dark theme" title="Toggle theme (T)">
    <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="12" cy="12" r="4" />
      <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" />
    </svg>
    <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" />
    </svg>
  </button>

  <header class="hero">
    <div class="hero-badge">⚡ open-source prompt library</div>
    <h1 class="hero-title">
      <span class="tl">Prompt</span><span class="grad"><span class="tl">Vault</span></span>
    </h1>
    <p class="hero-tagline">
      Stop rewriting the same prompts. Search, expand, <b>copy</b> — go.
    </p>

    <div class="search-wrap">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M21 21l-4.3-4.3m1.8-5.2a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
        <input
          id="search"
          type="text"
          placeholder="Search prompts…  (try 'debug', 'viral', 'sql')"
          autocomplete="off"
          spellcheck="false"
          aria-label="Search prompts"
        />
        <kbd class="search-kbd">/</kbd>
      </div>
      <div id="chips" class="chips" role="tablist" aria-label="Filter by category"></div>
    </div>

    <div id="stats" class="stats"></div>
  </header>

  <main class="results-wrap">
    <div id="results" class="results" role="list"></div>
    <div id="empty" class="empty hidden">
      <div class="empty-emoji">🕳️</div>
      <p>No prompts match that. Try a different word.</p>
    </div>
  </main>

  <footer class="site-footer">
    <p>Built for builders. Add your own prompts in <code>prompts.js</code>.</p>
    <a class="gh-link" href="https://github.com/noncent/promptvault" target="_blank" rel="noopener">
      ★ Star on GitHub
    </a>
  </footer>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- Data first, then app logic -->
  <script src="prompts.js?v=edgeghosts1"></script>
  <script src="app.js?v=edgeghosts1"></script>
</body>
</html>
